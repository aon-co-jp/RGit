<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>RGit</title>
<style>
  body { font-family: sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
  #layout { display: flex; gap: 2rem; }
  #sidebar { width: 220px; flex-shrink: 0; }
  #repo-list { list-style: none; padding: 0; }
  #repo-list li { margin: 0.25rem 0; }
  a.repo-link { text-decoration: none; color: #0969da; cursor: pointer; }
  #status { color: #666; font-size: 0.9em; margin-bottom: 1rem; }
  #readme { border-left: 1px solid #ddd; padding-left: 1.5rem; flex: 1; }
  #auth-bar { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; padding: 0.5rem 0.75rem; background: #f6f8fa; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; }
  #auth-bar input { padding: 0.2rem 0.4rem; }
  #auth-bar button { cursor: pointer; }
  #auth-status { color: #444; }
  #capacity-status { margin-left: auto; color: #666; }
  .hidden { display: none !important; }
  #auth-error { color: #b00; }
</style>
</head>
<body>
<h1>RGit</h1>
<div id="auth-bar">
  <div id="auth-anon">
    <input id="login-email" type="email" placeholder="メールアドレス" size="24">
    <button id="btn-request-otp" type="button">OTP送信</button>
    <input id="login-code" type="text" placeholder="コード" size="8" class="hidden">
    <button id="btn-verify-otp" type="button" class="hidden">ログイン</button>
  </div>
  <div id="auth-logged-in" class="hidden">
    <span id="auth-email"></span>
    <button id="btn-logout" type="button">ログアウト</button>
  </div>
  <span id="auth-error"></span>
  <span id="capacity-status"></span>
</div>
<div id="status">起動中...</div>
<div id="layout">
  <div id="sidebar"><ul id="repo-list"></ul></div>
  <div id="readme"><p><em>左のリポジトリ名をクリックするとREADMEを表示します。</em></p></div>
</div>

<div id="admin-panel" class="hidden">
  <h2>管理</h2>
  <div id="admin-error"></div>

  <section id="admin-requests">
    <h3>アクセス申請</h3>
    <button id="btn-refresh-requests" type="button">更新</button>
    <ul id="requests-list"></ul>
  </section>

  <section id="admin-accounts">
    <h3>登録アカウント</h3>
    <input id="new-account-email" type="email" placeholder="メールアドレス" size="24">
    <button id="btn-add-account" type="button">追加</button>
    <button id="btn-refresh-accounts" type="button">更新</button>
    <ul id="accounts-list"></ul>
  </section>

  <section id="admin-groups">
    <h3>グループ</h3>
    <input id="new-group-name" type="text" placeholder="グループ名" size="16">
    <button id="btn-create-group" type="button">作成</button>
    <button id="btn-refresh-groups" type="button">更新</button>
    <div id="group-token-display"></div>
    <ul id="groups-list"></ul>
  </section>

  <section id="admin-repo-access">
    <h3>リポジトリのアクセス設定</h3>
    <select id="access-repo-select"></select>
    <button id="btn-load-access" type="button">読み込み</button>
    <div id="access-status"></div>
    <div id="access-form" class="hidden">
      <div>
        モード:
        <select id="access-mode">
          <option value="private">private</option>
          <option value="public">public</option>
          <option value="group">group</option>
        </select>
        グループ名: <input id="access-group-name" type="text" size="16">
      </div>
      <div>
        <label><input type="checkbox" id="access-allow-view"> 閲覧許可</label>
        <label><input type="checkbox" id="access-allow-download"> ダウンロード許可</label>
        <label><input type="checkbox" id="access-allow-push"> push許可</label>
      </div>
      <div>
        <strong>アカウント個別許可</strong>
        <ul id="access-accounts-rows"></ul>
        <input id="access-new-account-email" type="email" placeholder="メールアドレス" size="24">
        <label><input type="checkbox" id="access-new-account-view"> 閲覧</label>
        <label><input type="checkbox" id="access-new-account-dl"> DL</label>
        <label><input type="checkbox" id="access-new-account-push"> push</label>
        <button id="btn-add-access-account-row" type="button">追加</button>
      </div>
      <button id="btn-save-access" type="button">保存</button>
    </div>
  </section>
</div>

<script type="module">
  import init from "./rgit_web.js";
  init();
</script>
</body>
</html>
